{{define "content"}}
<div class="content">
    <h1>Confirm Delete</h1>

    <table class="data-table">
        <thead>
        <tr>
            <th>Name</th>
        </tr>
        </thead>
        <tbody>
        {{if .Domains}}
        {{range .Domains}}
        <tr>
            <td>{{.Name}}</td>
        </tr>
        {{end}}
        {{else}}
        <tr>
            <td>no items</td>
        </tr>
        {{end}}
        </tbody>
    </table>
    <form method="post" action="{{.Context}}/cddomains">
        <div class="btn-row">
            <input class="btn btn-delete" type="submit" name="submit" value="Confirm">
            <input class="btn btn-cancel" type="submit" name="cancel" value="Cancel">
        </div>
    </form>
</div>
{{end}}
