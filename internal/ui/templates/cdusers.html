{{define "content"}}
<div class="content">
    <h1>Confirm Delete Users</h1>
    <h2>Domain: {{.Domain.Name}}</h2>

    <table class="data-table">
        <thead>
        <tr>
            <th>Name</th>
        </tr>
        </thead>
        <tbody>
        {{if .Users}}
        {{range .Users}}
        <tr>
            <td>{{.Login}}</td>
        </tr>
        {{end}}
        {{else}}
        <tr>
            <td>no items</td>
        </tr>
        {{end}}
        </tbody>
    </table>
    <form method="post" action="/cdusers">
        <div class="btn-row">
            <input class="btn btn-delete" type="submit" name="submit" value="Confirm">
            <input class="btn btn-cancel" type="submit" name="cancel" value="Cancel">
        </div>
    </form>
</div>
{{end}}
