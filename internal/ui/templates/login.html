{{define "content"}}
<div class="content">
    <h1>Login</h1>

    <form class="form" method="post" action="/login">
        <label class="form-label" for="idlogin">Login</label>
        <input class="form-input" id="idlogin" type="text" name="login" value="{{.Login}}">
        <label class="form-label" for="idpassword">Password</label>
        <input class="form-input" id="idpassword" type="password" name="password">
        <input class="btn" type="submit" name="submit" value="Login">
    </form>

</div>
{{end}}
