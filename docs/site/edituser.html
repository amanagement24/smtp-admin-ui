<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Edit Domain</title>
    <link rel="stylesheet" href="dep/style.css">
</head>
<body>
<div class="header">
    <div class="left">
        <div class="logo">

        </div>
        <div class="menu">
            <ul>
                <li><a href="#">Login</a></li>
                <li><a href="#">Logout</a></li>
                <li><a href="#">Domains</a></li>
            </ul>
        </div>
    </div>
    <div class="right">
        Daniel (dgabrov)
    </div>
</div>
<div class="content">
    <h1>Add Edit User info@alfa.com</h1>

    <div class="form">
        <label class="form-label" for="idlogin">Login</label>
        <input class="form-input" id="idlogin" type="text">
        <div class="form-check">
            <input id="idadmin" type="checkbox">
            <label for="idadmin">Admin?</label>
        </div>
    </div>

    <table class="data-table">
        <thead>
        <tr>
            <th>Mailbox</th>
            <th>Flags</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>Inbox</td>
            <td class="place"><div class="tag">Inbox</div></td>
        </tr>
        <tr>
            <td>Drafts</td>
            <td class="place"><div class="tag">Drafts</div></td>
        </tr>
        </tbody>
    </table>

    <div class="btn-row">
        <input class="btn" type="button" value="Submit">
        <input class="btn btn-cancel" type="button" value="Cancel">
    </div>
</div>
</body>
</html>
